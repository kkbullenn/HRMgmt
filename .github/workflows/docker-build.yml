name: Build and Deploy to ACR

on:
  push:
    branches:
      - test-dev

env:
  REGISTRY: hrmgmtregistry123.azurecr.io
  IMAGE_NAME: hrmgmtapp

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3
  
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
  
    - name: Login to ACR
      run: echo ${{ secrets.ACR_PASSWORD }} | docker login hrmgmtregistry123.azurecr.io -u ${{ secrets.ACR_USERNAME }} --password-stdin

  - name: Build and Push AMD64 image
    run: |
      docker buildx build \
        --platform linux/amd64 \
        -f ./HRMgmt/Dockerfile \
        -t $REGISTRY/$IMAGE_NAME:latest \
        --push \
        ./HRMgmt

        