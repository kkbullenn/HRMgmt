name: Test

on:
  push:
    branches:
      - 'test/**'

  pull_request:
    branches:
      - dev

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
    
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.102'
      
      - name: Restore dependencies
        run: dotnet restore HRMgmt.sln
        
      - name: Build
        run: dotnet build HRMgmt.sln --no-restore --configuration Release
      
      - name: Run tests
        run: dotnet test HRMgmt.sln --no-build --configuration Release --verbosity normal
