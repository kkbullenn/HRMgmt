name: Test

on:
  push:
    branches:
      - 'test/**'

  pull_request:
    branches:
      - dev
      - test-dev

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.102'

      - name: Restore dependencies
        run: dotnet restore HRMgmt.sln

      - name: Build
        run: dotnet build HRMgmt.sln --no-restore --configuration Release

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Start application in background
        env:
          TEST_MODE: "true"
          ConnectionStrings__LocalConnection: Data Source=${{ github.workspace }}/HRMgmt/hrmgmt.db
        run: |
          dotnet run --project HRMgmt/HRMgmt.csproj --configuration Release --no-launch-profile --urls http://127.0.0.1:5175 > app.log 2>&1 &
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:5175/ > /dev/null; then
              echo "Application is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Application failed to start in time"
          cat app.log
          exit 1

      - name: Run tests
        run: dotnet test HRMgmtTest/HRMgmtTest.csproj --no-build --configuration Release --verbosity normal

      - name: Print app log on failure
        if: failure()
        run: cat app.log