name: Dockerize and Publish

on:
  workflow_dispatch:
  pull_request:
    branches: [ test-dev, main, dev, devops/docker ]

env:
  REGISTRY: hrmgmtregistry123.azurecr.io
  IMAGE_NAME: hrmgmtapp

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to ACR
        run: echo ${{ secrets.ACR_PASSWORD }} | docker login $REGISTRY -u ${{ secrets.ACR_USERNAME }} --password-stdin

      - name: Build and Push AMD64 image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f HRMgmt/Dockerfile \
            -t $REGISTRY/$IMAGE_NAME:pr-${{ github.event.pull_request.number }} \
            --push \
            ./HRMgmt
