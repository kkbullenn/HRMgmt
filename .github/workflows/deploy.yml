name: Build and Deploy to Azure Container Reposiories

on:
  push:
    branches:
      - dev

env:
  REGISTRY: hrmgmtregistry123.azurecr.io
  IMAGE_NAME: hrmgmtapp

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name hrmgmtregistry123

      - name: Build image
        run: |
          docker build -t $REGISTRY/$IMAGE_NAME:latest .

      - name: Push image
        run: |
          docker push $REGISTRY/$IMAGE_NAME:latest
